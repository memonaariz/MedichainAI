{% extends "base.html" %}

{% block title %}Home - Senior Care App{% endblock %}

{% block content %}
<div class="card">
    <h2>Welcome to Senior Care App</h2>
    <p style="margin-top: 1rem; font-size: 1.1rem;">
        A simple and easy-to-use application designed for seniors.
    </p>
    
    {% if user %}
        <p style="margin-top: 1rem;">
            <a href="{{ url_for('dashboard') }}" class="btn">Go to Dashboard</a>
        </p>
    {% else %}
        <p style="margin-top: 1rem;">
            <a href="{{ url_for('login') }}" class="btn">Login</a>
        </p>
    {% endif %}
</div>
{% endblock %}
